[files]
extend-exclude = [
  "ci/checks/*",
  "img/*.cast",
  "scripts/generate-asciinema-gif",
  "tests/test_cli.py"  # to allow for testing typos in commands/flags
]

[default.extend-words]
urrent = "urrent"  # to allow for `c[urrent]`
tatus = "tatus"  # to allow for `s[tatus]`
ther = "ther"  # to allow for `o[ther]`
typ = "typ"  # to allow for `typ[e]`
