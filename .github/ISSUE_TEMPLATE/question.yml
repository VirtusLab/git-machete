name: Question
description: Ask a question about git machete usage
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant context (branch layout, git machete status output, etc.).
    validations:
      required: false
